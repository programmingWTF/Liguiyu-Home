services:
  # ── 公开站点（端口 3090）：liguiyu.com ──
  liguiyu-home:
    build:
      context: .
      args:
        ADMIN_MODE: "false"
    container_name: liguiyu-home
    restart: unless-stopped
    ports:
      - "3090:3000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - ADMIN_EMAILS=3477492305@qq.com
      - AUTH_URL=https://www.liguiyu.com

  # ── 管理后台（端口 3091）：Cloudflare Zero Trust 保护，应用层无鉴权 ──
  liguiyu-admin:
    build:
      context: .
      args:
        ADMIN_MODE: "true"
    container_name: liguiyu-admin
    restart: unless-stopped
    ports:
      - "3091:3000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - ADMIN_MODE=true
